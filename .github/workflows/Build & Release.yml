name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6.0.2
      
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Build with PyInstaller
        run: pyinstaller main.spec --distpath ./dist --workpath ./build
      
      - name: Extract version from tag
        shell: powershell
        run: |
          $tagName = "${{ github.ref_name }}"
          $match = [regex]::Match($tagName, '^v(\d+\.\d+\.\d+)$')
          if (!$match.Success) {
              Write-Error "Tag '$tagName' is not in format vMAJOR.MINOR.PATCH"
              exit 1
          }
          $MAJOR_MINOR_PATCH = $match.Groups[1].Value
          $VERSION = "$MAJOR_MINOR_PATCH.0"
          echo "APP_VERSION=$VERSION" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append


      - name: Create installer
        run: |
          choco install nsis -y
          & 'C:\Program Files (x86)\NSIS\makensis.exe' /DAPP_VERSION="${{ env.APP_VERSION }}" installer.nsi
      
      - name: Extract version
        id: version
        run: echo "VERSION=$($env:GITHUB_REF -replace 'refs/tags/v', '')" | Out-String | Tee-Object -Variable out; echo $out
      
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: LocatorViewerInstaller.exe
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
